<!DOCTYPE html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bearilog Wasm</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/svg-toolbelt@latest/dist/svg-toolbelt.css"
  />
  <style>
    *,
    html,
    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: monospace;
    }
    html {
      background-color: black;
    }
    .loading {
      font-size: 24px;
      color: #555;
    }
    .error {
      color: red;
      border: 1px solid red;
      font-weight: bold;
      padding: 10px;
      margin: 40px auto;
      width: 400px;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    body {
      display: grid;
      grid-template-rows: minmax(400px, 1fr) auto 1fr;
      grid-template-columns: 1fr;
      height: 100%;
    }
    html {
      height: 100%;
    }
    .monaco {
      height: 400px;
    }
    .svgs {
      filter: invert(1);
    }
    .graphviz-container {
      position: relative;
      overflow: hidden;
      display: grid;
      grid-template-rows: 1fr 0;
      grid-template-columns: 1fr;
    }
    .graphviz-error {
      position: absolute;
      color: red;
      top: -10px;
      left: 50%;
      transform: translate(-50%, -100%);
      border: 1px solid red;
      background-color: rgba(255, 0, 0, 0.2);
      padding: 10px;
    }
    .controls {
      position: relative;
      padding: 4px;
      display: flex;
      gap: 4px;
      background-color: #444;
      align-items: center;
    }
    .controls button,
    .controls select {
      font-family: monospace;
      padding: 4px 8px;
    }
    .controls button:hover,
    .controls select:hover {
      cursor: pointer;
    }
    .controls select option {
      color: black !important;
    }
    .controls .checkbox {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .controls label {
      color: white;
      cursor: pointer;
    }
    .settings {
      position: relative;
      z-index: 1;
    }
    .more-settings {
      position: absolute;
      width: 200px;
      background-color: #555;
      margin-top: 4px;
      border-radius: 4px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
  </style>
</head>
<body>
  <script type="module" src="app.js"></script>
</body>
