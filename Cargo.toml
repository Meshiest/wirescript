[package]
name = "bearilog"
version = "0.1.0"
edition = "2024"

[build-dependencies]
lalrpop = "0.22.2"

[dependencies]
blake3 = "1.8.2"
chrono = { version = "0.4.41", default-features = false }
clap = { version = "4.5.40", features = ["derive"] }
clap-stdin = "0.6.0"
indexmap = "2.9.0"
lalrpop-util = { version = "0.21.0", features = ["lexer", "unicode"] }
parking_lot = "0.12.4"
rmp = "0.8.14"
rusqlite = { version = "0.36.0", features = ["blob", "bundled", "chrono"] }
thiserror = "2.0.12"
zstd = "0.13.3"
